<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — 4 Directions</title>
  <link rel="stylesheet" href="../colors_and_type.css"/>
  <style>
    html, body, #root { height: 100%; }
    body { margin: 0; background: #f0eee9; }
    @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="../ui_kits/web/components/Icon.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="V1Refined.jsx"></script>
  <script type="text/babel" src="V2Editorial.jsx"></script>
  <script type="text/babel" src="V3Warehouse.jsx"></script>
  <script type="text/babel" src="V4Calm.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    requestAnimationFrame(() => {
      const W = 1280, H = 900;
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(
        <DesignCanvas>
          <DCSection id="admin-dashboard" title="관리자 대시보드 · 4 directions" subtitle="Same data, four design languages. Open any artboard fullscreen with the ⤢ icon.">
            <DCArtboard id="v1" label="V1 · Refined" width={W} height={H}><V1Refined/></DCArtboard>
            <DCArtboard id="v2" label="V2 · Editorial dense" width={W} height={H}><V2Editorial/></DCArtboard>
            <DCArtboard id="v3" label="V3 · Warehouse spatial" width={W} height={H}><V3Warehouse/></DCArtboard>
            <DCArtboard id="v4" label="V4 · Calm minimal" width={W} height={H}><V4Calm/></DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    });
  </script>
</body>
</html>
