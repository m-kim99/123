<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — 4 More Creative Directions</title>
  <link rel="stylesheet" href="../colors_and_type.css"/>
  <style>
    html, body, #root { height: 100%; }
    body { margin: 0; background: #f0eee9; }
    @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes cursor { 0%, 49% { opacity: 1 } 50%, 100% { opacity: 0 } }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="../ui_kits/web/components/Icon.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="V5Section.jsx"></script>
  <script type="text/babel" src="V6Calendar.jsx"></script>
  <script type="text/babel" src="V7Console.jsx"></script>
  <script type="text/babel" src="V8Manifest.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    requestAnimationFrame(() => {
      const W = 1280, H = 900;
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(
        <DesignCanvas>
          <DCSection
            id="creative"
            title="관리자 대시보드 · 4 more creative"
            subtitle="V1(폴리시) + V3(공간감) 방향을 더 밀어붙인 4가지. ⤢ 또는 ←/→ 키로 전체화면."
          >
            <DCArtboard id="v5" label="V5 · 건물 단면도 (Architectural section)" width={W} height={H}><V5Section/></DCArtboard>
            <DCArtboard id="v6" label="V6 · NFC 스캔 캘린더 히트맵"            width={W} height={H}><V6Calendar/></DCArtboard>
            <DCArtboard id="v7" label="V7 · 실시간 운영 콘솔 (NOC)"             width={W} height={H}><V7Console/></DCArtboard>
            <DCArtboard id="v8" label="V8 · 보관 매니페스트 (Logistics)"         width={W} height={H}><V8Manifest/></DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    });
  </script>
</body>
</html>
