<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head><body><div class="card">
  <div class="row">
    
  <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
    <div style="height:64px;border-radius:8px;background:#10b981;border:1px solid rgba(0,0,0,0.06);"></div>
    <div style="font-weight:600;font-size:12px;color:var(--fg);">Success</div>
    <div class="mono">#10b981</div>
  </div>
    
  <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
    <div style="height:64px;border-radius:8px;background:#f59e0b;border:1px solid rgba(0,0,0,0.06);"></div>
    <div style="font-weight:600;font-size:12px;color:var(--fg);">Warning</div>
    <div class="mono">#f59e0b</div>
  </div>
    
  <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
    <div style="height:64px;border-radius:8px;background:#ef4444;border:1px solid rgba(0,0,0,0.06);"></div>
    <div style="font-weight:600;font-size:12px;color:var(--fg);">Danger</div>
    <div class="mono">#ef4444</div>
  </div>
    
  <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
    <div style="height:64px;border-radius:8px;background:#eab308;border:1px solid rgba(0,0,0,0.06);"></div>
    <div style="font-weight:600;font-size:12px;color:var(--fg);">Favorite (star)</div>
    <div class="mono">#eab308</div>
  </div>
  </div>
  <div class="label">SEMANTIC — success: team-member counts. Warning: expiry. Danger: destructive. Yellow: ★ favorites only.</div>
</div></body></html>
