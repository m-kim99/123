<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head><body><div class="card">
  <div class="row" style="gap:16px;">
    <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
      <label style="font-size:14px;font-weight:500;color:var(--fg);">이메일</label>
      <input style="height:36px;padding:0 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;background:transparent;outline:none;" placeholder="example@company.com"/>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
      <label style="font-size:14px;font-weight:500;color:var(--fg);">부서 코드</label>
      <input style="height:36px;padding:0 12px;border:1px solid #2563eb;border-radius:6px;font-size:14px;font-family:inherit;outline:none;box-shadow:0 0 0 1px #2563eb33;" value="HR001"/>
    </div>
  </div>
  <div class="row" style="gap:16px;">
    <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
      <label style="font-size:14px;font-weight:500;color:var(--fg);">새 비밀번호</label>
      <input type="password" style="height:36px;padding:0 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;outline:none;" value="••••••••"/>
      <div style="font-size:11px;color:#ef4444;">⚠️ 8자 이상, 대/소문자, 숫자, 특수문자 포함</div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
      <label style="font-size:14px;font-weight:500;color:var(--fg);">설명 <span style="color:var(--fg-subtle);font-weight:400;">(선택)</span></label>
      <textarea style="min-height:64px;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;outline:none;resize:none;" placeholder="세부 스토리지 설명"></textarea>
    </div>
  </div>
</div></body></html>
