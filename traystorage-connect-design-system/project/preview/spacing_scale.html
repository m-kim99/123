<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head><body><div class="card">
  <div class="col" style="gap:6px;">
    
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:4px;height:18px;background:var(--brand-soft);border-radius:3px;"></div>
        <div class="mono" style="width:80px;">space-1 · 4px</div>
        <div style="font-size:12px;color:var(--fg-muted);">gap inside chips</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:8px;height:18px;background:var(--brand-soft);border-radius:3px;"></div>
        <div class="mono" style="width:80px;">space-2 · 8px</div>
        <div style="font-size:12px;color:var(--fg-muted);">icon ↔ label inside button</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:12px;height:18px;background:var(--brand-soft);border-radius:3px;"></div>
        <div class="mono" style="width:80px;">space-3 · 12px</div>
        <div style="font-size:12px;color:var(--fg-muted);">inner card gaps</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:16px;height:18px;background:var(--brand-soft);border-radius:3px;"></div>
        <div class="mono" style="width:80px;">space-4 · 16px</div>
        <div style="font-size:12px;color:var(--fg-muted);">card → card grid gap</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:24px;height:18px;background:var(--brand-soft);border-radius:3px;"></div>
        <div class="mono" style="width:80px;">space-6 · 24px</div>
        <div style="font-size:12px;color:var(--fg-muted);">card padding · page padding</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:32px;height:18px;background:var(--brand-soft);border-radius:3px;"></div>
        <div class="mono" style="width:80px;">space-8 · 32px</div>
        <div style="font-size:12px;color:var(--fg-muted);">large section breaks</div>
      </div>
  </div>
  <div class="label">SPACING — Tailwind scale. Page and card padding both use 24px (space-6).</div>
</div></body></html>
