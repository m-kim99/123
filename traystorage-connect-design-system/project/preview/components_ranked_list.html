<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body>
<div class="card" style="gap:18px;">

  <!-- header -->
  <div style="display:flex;align-items:flex-end;justify-content:space-between;">
    <div>
      <div style="display:flex;align-items:center;gap:8px;font-weight:600;font-size:15px;color:#0f172a;letter-spacing:-0.01em;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M10 6h4M10 10h4M10 14h4M10 18h4"/></svg>
        많이 사용하는 부서
      </div>
      <div style="font-size:11px;color:#94a3b8;margin-top:3px;">최근 30일 · 방문 빈도순</div>
    </div>
    <span style="font-size:11px;color:#64748b;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:#f1f5f9;padding:3px 8px;border-radius:9999px;border:1px solid #e2e8f0;">전체 4</span>
  </div>

  <!-- ranked rows -->
  <div style="display:flex;flex-direction:column;gap:8px;">

    <!-- Row template: rank | name+meta | bar | count
         Top rank has its own visual lift; lower ranks fade gracefully. -->

    <!-- #1 -->
    <div style="display:grid;grid-template-columns:48px 1fr 110px 60px;gap:14px;align-items:center;padding:14px 16px;border:1px solid #e2e8f0;border-radius:10px;background:linear-gradient(180deg,#fafafa 0%,#f4f4f5 100%);position:relative;overflow:hidden;">
      <div style="position:absolute;left:0;top:0;bottom:0;width:3px;background:#0f172a;"></div>
      <div style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:28px;font-weight:600;color:#0f172a;letter-spacing:-0.04em;line-height:1;font-feature-settings:'tnum';">01</div>
      <div style="min-width:0;">
        <div style="font-weight:600;font-size:14px;color:#0f172a;letter-spacing:-0.005em;">인사팀</div>
        <div style="font-size:11px;color:#64748b;margin-top:3px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;">HR001 · 4 대분류</div>
      </div>
      <div>
        <div style="height:4px;background:#e2e8f0;border-radius:9999px;overflow:hidden;">
          <div style="width:100%;height:100%;background:#0f172a;border-radius:9999px;"></div>
        </div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:18px;font-weight:600;color:#0f172a;letter-spacing:-0.02em;line-height:1;font-feature-settings:'tnum';">24</div>
        <div style="font-size:10px;color:#94a3b8;margin-top:3px;">방문</div>
      </div>
    </div>

    <!-- #2 -->
    <div style="display:grid;grid-template-columns:48px 1fr 110px 60px;gap:14px;align-items:center;padding:14px 16px;border:1px solid #e2e8f0;border-radius:10px;background:#ffffff;">
      <div style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:28px;font-weight:500;color:#475569;letter-spacing:-0.04em;line-height:1;font-feature-settings:'tnum';">02</div>
      <div style="min-width:0;">
        <div style="font-weight:600;font-size:14px;color:#0f172a;letter-spacing:-0.005em;">개발팀</div>
        <div style="font-size:11px;color:#64748b;margin-top:3px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;">DEV001 · 5 대분류</div>
      </div>
      <div>
        <div style="height:4px;background:#e2e8f0;border-radius:9999px;overflow:hidden;">
          <div style="width:75%;height:100%;background:#475569;border-radius:9999px;"></div>
        </div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:18px;font-weight:600;color:#0f172a;letter-spacing:-0.02em;line-height:1;font-feature-settings:'tnum';">18</div>
        <div style="font-size:10px;color:#94a3b8;margin-top:3px;">방문</div>
      </div>
    </div>

    <!-- #3 -->
    <div style="display:grid;grid-template-columns:48px 1fr 110px 60px;gap:14px;align-items:center;padding:14px 16px;border:1px solid #e2e8f0;border-radius:10px;background:#ffffff;">
      <div style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:28px;font-weight:500;color:#94a3b8;letter-spacing:-0.04em;line-height:1;font-feature-settings:'tnum';">03</div>
      <div style="min-width:0;">
        <div style="font-weight:600;font-size:14px;color:#0f172a;letter-spacing:-0.005em;">마케팅팀</div>
        <div style="font-size:11px;color:#64748b;margin-top:3px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;">MKT001 · 3 대분류</div>
      </div>
      <div>
        <div style="height:4px;background:#e2e8f0;border-radius:9999px;overflow:hidden;">
          <div style="width:46%;height:100%;background:#94a3b8;border-radius:9999px;"></div>
        </div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:18px;font-weight:600;color:#0f172a;letter-spacing:-0.02em;line-height:1;font-feature-settings:'tnum';">11</div>
        <div style="font-size:10px;color:#94a3b8;margin-top:3px;">방문</div>
      </div>
    </div>

    <!-- #4 -->
    <div style="display:grid;grid-template-columns:48px 1fr 110px 60px;gap:14px;align-items:center;padding:14px 16px;border:1px solid #e2e8f0;border-radius:10px;background:#ffffff;">
      <div style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:28px;font-weight:500;color:#cbd5e1;letter-spacing:-0.04em;line-height:1;font-feature-settings:'tnum';">04</div>
      <div style="min-width:0;">
        <div style="font-weight:600;font-size:14px;color:#0f172a;letter-spacing:-0.005em;">회계팀</div>
        <div style="font-size:11px;color:#64748b;margin-top:3px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;">FIN001 · 4 대분류</div>
      </div>
      <div>
        <div style="height:4px;background:#e2e8f0;border-radius:9999px;overflow:hidden;">
          <div style="width:25%;height:100%;background:#cbd5e1;border-radius:9999px;"></div>
        </div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:18px;font-weight:600;color:#0f172a;letter-spacing:-0.02em;line-height:1;font-feature-settings:'tnum';">6</div>
        <div style="font-size:10px;color:#94a3b8;margin-top:3px;">방문</div>
      </div>
    </div>

  </div>

  <div class="label" style="border-top:1px solid #e2e8f0;padding-top:12px;margin-top:4px;">RANKED LIST · 회색 톤. 상위는 진하고 묵직하게, 하위는 얇아지며 자연스러운 위계.</div>

</div>
</body></html>
