<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TrayStorage CONNECT — UI Kit</title>
  <link rel="stylesheet" href="tokens.css"/>
  <style>
    html, body, #root { height: 100%; }
    body { margin: 0; background: #f8f9fa; }
    /* keyframe used by ToastHost */
    @keyframes slideIn {
      from { transform: translateX(20px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    /* Reset button focus rings to shadcn style */
    button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
      outline: 2px solid #0f172a;
      outline-offset: 1px;
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="components/Icon.jsx"></script>
  <script type="text/babel" src="components/Primitives.jsx"></script>
  <script type="text/babel" src="components/Chrome.jsx"></script>
  <script type="text/babel" src="components/LoginScreen.jsx"></script>
  <script type="text/babel" src="components/DashboardScreen.jsx"></script>
  <script type="text/babel" src="components/SubcategoryScreen.jsx"></script>
  <script type="text/babel" src="components/Chatbot.jsx"></script>
  <script type="text/babel" src="components/App.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    // Wait a tick for all the script-tag-loaded Babel modules to register their globals.
    requestAnimationFrame(() => {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    });
  </script>
</body>
</html>
